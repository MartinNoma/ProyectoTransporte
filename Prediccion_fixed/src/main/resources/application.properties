spring.application.name=prediccion

server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/db_prediccion
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URL del Microservicio de Geolocalizacion
geolocalizacion.service.url=${GEOLOCALIZACION_SERVICE_URL:http://localhost:8080}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
